name: Deploy dash.mpg.com.np

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 1000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, tokenizer, xml
          coverage: none

      - name: Show PHP version
        run: php -v

      - name: Show Composer version
        run: composer --version

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show Node and NPM version
        run: |
          node -v
          npm -v

      - name: Clean Node install
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Install Node dependencies
        run: npm install

      - name: Fix Vite and esbuild permissions
        run: |
          chmod +x node_modules/.bin/vite || true
          chmod +x node_modules/esbuild/bin/esbuild || true
          chmod +x node_modules/@esbuild/linux-x64/bin/esbuild || true

      - name: Rebuild esbuild
        run: npm rebuild esbuild

      - name: Build Vite assets
        run: npm run build

      - name: Prepare deployment package
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -f .env
          rm -f .env.*
          find storage/logs -type f ! -name ".gitignore" -delete || true
          find bootstrap/cache -type f ! -name ".gitignore" -delete || true

      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/storage/logs/**
